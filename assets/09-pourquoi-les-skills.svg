<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pourquoi les skills : sans skill on répète, avec skill on capitalise</title>
<desc>À gauche, sans skill : à chaque conversation on recolle les mêmes instructions. À droite, avec skill : les instructions sont rangées une fois et chargées au besoin.</desc>
<style>
  text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:600}.ts{font-size:12px}.tss{font-size:10px}
  .gray-fill{fill:#ECEAE3;stroke:#CFCBC0}
  .teal-fill{fill:#D8ECE6;stroke:#9CC6BB}
  .coral-fill{fill:#F6DCCF;stroke:#DCA888}
  .gray-tx{fill:#3A382F}.teal-tx{fill:#1F4D43}.coral-tx{fill:#7A3B22}.muted{fill:#6F6C63}
  .div{stroke:#D8D5CC;stroke-width:1;stroke-dasharray:3 2}
  .link{stroke:#B8B5AC;stroke-width:1;fill:none;stroke-dasharray:3 2}
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B8B5AC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th gray-tx" x="170" y="30" text-anchor="middle">Sans skill</text>
<text class="ts muted" x="170" y="48" text-anchor="middle">on recolle tout, à chaque fois</text>
<text class="th teal-tx" x="510" y="30" text-anchor="middle">Avec skill</text>
<text class="ts muted" x="510" y="48" text-anchor="middle">rangé une fois, chargé au besoin</text>
<line class="div" x1="340" y1="20" x2="340" y2="252"/>

<g>
<rect class="gray-fill" x="50" y="66" width="240" height="48" rx="8" stroke-width="0.8"/>
<rect class="coral-fill" x="60" y="76" width="116" height="20" rx="10" stroke-width="0.6"/>
<text class="tss coral-tx" x="118" y="86" text-anchor="middle" dominant-baseline="central">instructions recollées</text>
<text class="ts gray-tx" x="186" y="90" dominant-baseline="central">+ ta question</text>
</g>
<g>
<rect class="gray-fill" x="50" y="124" width="240" height="48" rx="8" stroke-width="0.8"/>
<rect class="coral-fill" x="60" y="134" width="116" height="20" rx="10" stroke-width="0.6"/>
<text class="tss coral-tx" x="118" y="144" text-anchor="middle" dominant-baseline="central">instructions recollées</text>
<text class="ts gray-tx" x="186" y="148" dominant-baseline="central">+ ta question</text>
</g>
<g>
<rect class="gray-fill" x="50" y="182" width="240" height="48" rx="8" stroke-width="0.8"/>
<rect class="coral-fill" x="60" y="192" width="116" height="20" rx="10" stroke-width="0.6"/>
<text class="tss coral-tx" x="118" y="202" text-anchor="middle" dominant-baseline="central">instructions recollées</text>
<text class="ts gray-tx" x="186" y="206" dominant-baseline="central">+ ta question</text>
</g>

<rect class="teal-fill" x="400" y="66" width="220" height="48" rx="8" stroke-width="0.8"/>
<text class="th teal-tx" x="510" y="84" text-anchor="middle">Skill</text>
<text class="ts teal-tx" x="510" y="102" text-anchor="middle">instructions rangées une fois</text>

<line class="link" x1="510" y1="114" x2="510" y2="148" marker-end="url(#arr)"/>
<text class="tss muted" x="566" y="131" dominant-baseline="central">chargé si pertinent</text>

<rect class="gray-fill" x="420" y="150" width="180" height="40" rx="8" stroke-width="0.8"/>
<text class="ts gray-tx" x="510" y="170" text-anchor="middle" dominant-baseline="central">une conversation : ta question</text>
<text class="tss muted" x="510" y="214" text-anchor="middle">↻ idem à chaque nouvelle conversation — sans rien recoller</text>

<text class="tss muted" x="340" y="280" text-anchor="middle">Capturer le savoir-faire une fois — fini le copier-coller, fini les oublis.</text>
</svg>
