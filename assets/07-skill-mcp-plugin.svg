<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Skill, MCP et Plugin : qui fait quoi</title>
<desc>Le skill est le mode d'emploi (méthode), l'outil ou MCP est la capacité d'agir, et le plugin est le paquet installable qui réunit ces briques.</desc>
<style>
  text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
  .th{font-size:15px;font-weight:600}.ts{font-size:12px}.tss{font-size:11px}
  .gray-fill{fill:#ECEAE3;stroke:#CFCBC0}
  .teal-fill{fill:#D8ECE6;stroke:#9CC6BB}
  .gray-tx{fill:#3A382F}.teal-tx{fill:#1F4D43}.muted{fill:#6F6C63}
  .plug{fill:#FBFAF7;stroke:#B8B5AC;stroke-dasharray:5 4}
  .rel{stroke:#B8B5AC;stroke-width:1;fill:none;stroke-dasharray:3 2}
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B8B5AC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="plug" x="40" y="44" width="600" height="200" rx="12" stroke-width="0.9"/>
<text class="th gray-tx" x="60" y="70">Plugin</text>
<text class="ts muted" x="128" y="70">paquet installable — réunit plusieurs briques et se distribue d'un bloc</text>

<rect class="teal-fill" x="72" y="92" width="250" height="104" rx="10" stroke-width="0.8"/>
<text class="th teal-tx" x="197" y="120" text-anchor="middle">Skill</text>
<text class="ts teal-tx" x="197" y="142" text-anchor="middle">le mode d'emploi</text>
<text class="tss muted" x="197" y="166" text-anchor="middle">méthode · règles · exemples · gabarits</text>

<rect class="gray-fill" x="358" y="92" width="250" height="104" rx="10" stroke-width="0.8"/>
<text class="th gray-tx" x="483" y="120" text-anchor="middle">Outils / MCP</text>
<text class="ts gray-tx" x="483" y="142" text-anchor="middle">la capacité d'agir</text>
<text class="tss muted" x="483" y="166" text-anchor="middle">se connecter · exécuter des actions</text>

<text class="tss muted" x="340" y="128" text-anchor="middle">utilise →</text>
<line class="rel" x1="322" y1="144" x2="358" y2="144" marker-end="url(#arr)"/>

<text class="ts muted" x="340" y="224" text-anchor="middle">+ commandes · hooks · sous-agents (selon les besoins)</text>

<text class="ts gray-tx" x="340" y="286" text-anchor="middle">Le skill dit comment faire — l'outil/MCP fait — le plugin réunit et distribue.</text>
</svg>
