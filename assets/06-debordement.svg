<svg width="100%" viewBox="0 0 680 505" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Débordement de la fenêtre de contexte</title>
<desc>Une fenêtre de capacité fixe sous un plafond ; le socle fixe est préservé en haut, les tours de conversation s'empilent, le plus ancien sort par le haut tandis qu'un nouveau tour entre par le bas.</desc>
<style>
  text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:600}.ts{font-size:12px}
  .gray-fill{fill:#ECEAE3;stroke:#CFCBC0}
  .coral-fill{fill:#F6DCCF;stroke:#DCA888}
  .gray-tx{fill:#3A382F}.coral-tx{fill:#7A3B22}.muted{fill:#6F6C63}
  .leader{stroke:#B8B5AC;stroke-width:.75;stroke-dasharray:3 2;fill:none}
  .frame{fill:none;stroke:#9A978E}
</style>
<defs>
  <marker id="arrC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th gray-tx" x="245" y="42" text-anchor="middle" dominant-baseline="central">Plafond : capacité max</text>
<line x1="130" y1="56" x2="360" y2="56" stroke="#9A978E" stroke-width="1.5"/>
<rect class="frame" x="130" y="56" width="230" height="388" rx="6" stroke-width="0.6"/>

<rect class="gray-fill" x="142" y="68" width="206" height="100" rx="6" stroke-width="0.6"/>
<text class="th gray-tx" x="245" y="104" text-anchor="middle" dominant-baseline="central">Socle fixe</text>
<text class="ts muted" x="245" y="122" text-anchor="middle" dominant-baseline="central">Système, outils, en-têtes</text>
<text class="ts muted" x="245" y="138" text-anchor="middle" dominant-baseline="central">préservé en priorité</text>

<rect class="coral-fill" x="142" y="190" width="206" height="24" rx="4" stroke-width="0.6"/>
<rect class="coral-fill" x="142" y="226" width="206" height="24" rx="4" stroke-width="0.6"/>
<rect class="coral-fill" x="142" y="262" width="206" height="24" rx="4" stroke-width="0.6"/>
<rect class="coral-fill" x="142" y="298" width="206" height="24" rx="4" stroke-width="0.6"/>
<rect class="coral-fill" x="142" y="334" width="206" height="24" rx="4" stroke-width="0.6"/>
<rect class="coral-fill" x="142" y="370" width="206" height="24" rx="4" stroke-width="0.6"/>
<text class="ts coral-tx" x="245" y="412" text-anchor="middle" dominant-baseline="central">tours de conversation</text>

<line x1="350" y1="202" x2="392" y2="190" stroke="#D85A30" stroke-width="1" marker-end="url(#arrC)"/>
<text class="ts muted" x="398" y="186" dominant-baseline="central">Le plus ancien sort</text>
<text class="ts muted" x="398" y="202" dominant-baseline="central">(tronqué ou résumé)</text>

<line class="leader" x1="348" y1="118" x2="378" y2="118"/>
<text class="ts muted" x="384" y="118" dominant-baseline="central">Protégé, jamais évincé</text>

<line x1="245" y1="486" x2="245" y2="450" stroke="#D85A30" stroke-width="1" marker-end="url(#arrC)"/>
<text class="ts muted" x="398" y="394" dominant-baseline="central">La conversation</text>
<text class="ts muted" x="398" y="410" dominant-baseline="central">monte : entre en bas,</text>
<text class="ts muted" x="398" y="426" dominant-baseline="central">sort en haut</text>
<text class="ts muted" x="245" y="498" text-anchor="middle" dominant-baseline="central">Nouveau tour : entre par le bas</text>
</svg>
