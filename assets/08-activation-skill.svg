<svg width="100%" viewBox="0 0 680 342" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Activation et modes de déclenchement d'un skill</title>
<desc>Deux états : toggle OFF (skill absent du contexte, zéro token) et toggle ON (en-tête présent), puis deux modes de déclenchement — Auto et Commande — menant tous deux au chargement du SKILL.md.</desc>
<style>
  text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:600}.ts{font-size:12px}.tss{font-size:10px}
  .gray-fill{fill:#ECEAE3;stroke:#CFCBC0}
  .teal-fill{fill:#D8ECE6;stroke:#9CC6BB}
  .coral-fill{fill:#F6DCCF;stroke:#DCA888}
  .gray-tx{fill:#3A382F}.teal-tx{fill:#1F4D43}.coral-tx{fill:#7A3B22}.muted{fill:#6F6C63}
  .off-bg{fill:#EFEDE7;stroke:#CFCBC0;stroke-dasharray:5 3}
  .div{stroke:#D8D5CC;stroke-width:1;stroke-dasharray:3 2}
  .link{stroke:#B8B5AC;stroke-width:1;fill:none}
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B8B5AC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="120" y="16" width="100" height="24" rx="12" fill="#CFCBC0"/>
<text class="th" x="170" y="28" text-anchor="middle" dominant-baseline="central" fill="#FBFAF7">OFF</text>
<rect x="460" y="16" width="100" height="24" rx="12" fill="#9CC6BB"/>
<text class="th" x="510" y="28" text-anchor="middle" dominant-baseline="central" fill="#FBFAF7">ON</text>

<text class="ts muted" x="170" y="50" text-anchor="middle">État : désactivé</text>
<text class="ts muted" x="510" y="50" text-anchor="middle">État : activé</text>

<line class="div" x1="330" y1="14" x2="330" y2="314"/>

<rect class="off-bg" x="40" y="60" width="260" height="80" rx="10" stroke-width="0.8"/>
<text class="th gray-tx" x="170" y="90" text-anchor="middle">Absent du contexte</text>
<text class="ts muted" x="170" y="112" text-anchor="middle">0 token · invisible au menu</text>

<rect class="teal-fill" x="380" y="60" width="260" height="80" rx="10" stroke-width="0.8"/>
<text class="th teal-tx" x="510" y="88" text-anchor="middle">En-tête présent</text>
<text class="ts teal-tx" x="510" y="108" text-anchor="middle">name + description chargés</text>

<path class="link" d="M510,140 L510,158 M510,158 L439,158 L439,164 M510,158 L581,158 L581,164"/>

<rect class="gray-fill" x="380" y="164" width="118" height="64" rx="8" stroke-width="0.8"/>
<text class="th gray-tx" x="439" y="186" text-anchor="middle">Auto</text>
<text class="ts muted" x="439" y="204" text-anchor="middle">description matche</text>
<text class="tss muted" x="439" y="220" text-anchor="middle">se déclenche seul</text>

<rect class="gray-fill" x="522" y="164" width="118" height="64" rx="8" stroke-width="0.8"/>
<text class="th gray-tx" x="581" y="186" text-anchor="middle">Commande</text>
<text class="ts muted" x="581" y="204" text-anchor="middle">/slash ou menu</text>
<text class="tss muted" x="581" y="220" text-anchor="middle">tu déclenches</text>

<line class="link" x1="439" y1="228" x2="462" y2="252" marker-end="url(#arr)"/>
<line class="link" x1="581" y1="228" x2="558" y2="252" marker-end="url(#arr)"/>

<rect class="coral-fill" x="396" y="252" width="228" height="56" rx="8" stroke-width="0.8"/>
<text class="th coral-tx" x="510" y="274" text-anchor="middle">SKILL.md chargé</text>
<text class="ts coral-tx" x="510" y="294" text-anchor="middle">instructions appliquées</text>

<text class="tss muted" x="340" y="330" text-anchor="middle">Le commutateur est le premier niveau de contrôle — il précède tout déclenchement.</text>
</svg>
