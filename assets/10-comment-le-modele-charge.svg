<svg width="100%" viewBox="0 0 700 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Comment le modèle charge un skill : découverte puis activation</title>
<desc>Phase 1, découverte : le harness injecte en permanence une liste légère des skills. Phase 2, activation : le modèle émet un appel d'outil ordinaire pour lire le fichier, le harness lit le disque et réinjecte le contenu, le modèle applique.</desc>
<style>
  text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
  .th{font-size:13px;font-weight:600}.ts{font-size:11px}.tss{font-size:10px}
  .gray-fill{fill:#ECEAE3;stroke:#CFCBC0}
  .teal-fill{fill:#D8ECE6;stroke:#9CC6BB}
  .coral-fill{fill:#F6DCCF;stroke:#DCA888}
  .gray-tx{fill:#3A382F}.teal-tx{fill:#1F4D43}.coral-tx{fill:#7A3B22}.muted{fill:#6F6C63}
  .div{stroke:#D8D5CC;stroke-width:1;stroke-dasharray:3 2}
  .link{stroke:#B8B5AC;stroke-width:1.2;fill:none}
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B8B5AC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th gray-tx" x="24" y="40">1. Découverte — toujours active</text>
<rect class="gray-fill" x="24" y="56" width="96" height="48" rx="8" stroke-width="0.8"/>
<text class="th gray-tx" x="72" y="80" text-anchor="middle">Harness</text>
<text class="tss muted" x="72" y="96" text-anchor="middle">orchestration</text>
<line class="link" x1="120" y1="80" x2="168" y2="80" marker-end="url(#arr)"/>
<text class="tss muted" x="144" y="70" text-anchor="middle">injecte</text>
<rect class="gray-fill" x="172" y="56" width="320" height="48" rx="8" stroke-width="0.8"/>
<text class="th gray-tx" x="332" y="78" text-anchor="middle">Liste légère des skills</text>
<text class="tss muted" x="332" y="94" text-anchor="middle">name + description + chemin — léger, en permanence</text>

<line class="div" x1="24" y1="126" x2="676" y2="126"/>

<text class="th gray-tx" x="24" y="152">2. Activation — à la demande</text>

<rect class="teal-fill" x="24" y="178" width="84" height="58" rx="8" stroke-width="0.8"/>
<text class="th teal-tx" x="66" y="207" text-anchor="middle">Modèle</text>
<line class="link" x1="108" y1="207" x2="148" y2="207" marker-end="url(#arr)"/>
<text class="tss muted" x="128" y="196" text-anchor="middle">lire</text>
<text class="tss muted" x="128" y="222" text-anchor="middle">le fichier</text>

<rect class="gray-fill" x="150" y="178" width="96" height="58" rx="8" stroke-width="0.8"/>
<text class="th gray-tx" x="198" y="207" text-anchor="middle">Harness</text>
<line class="link" x1="246" y1="207" x2="286" y2="207" marker-end="url(#arr)"/>
<text class="tss muted" x="266" y="196" text-anchor="middle">lit le</text>
<text class="tss muted" x="266" y="222" text-anchor="middle">disque</text>

<rect class="gray-fill" x="288" y="178" width="84" height="58" rx="8" stroke-width="0.8"/>
<text class="th gray-tx" x="330" y="207" text-anchor="middle">Disque</text>
<line class="link" x1="372" y1="207" x2="412" y2="207" marker-end="url(#arr)"/>
<text class="tss muted" x="392" y="196" text-anchor="middle">renvoie</text>
<text class="tss muted" x="392" y="222" text-anchor="middle">le contenu</text>

<rect class="coral-fill" x="414" y="178" width="130" height="58" rx="8" stroke-width="0.8"/>
<text class="th coral-tx" x="479" y="200" text-anchor="middle">Corps du SKILL.md</text>
<text class="tss coral-tx" x="479" y="218" text-anchor="middle">réinjecté en contexte</text>
<line class="link" x1="544" y1="207" x2="582" y2="207" marker-end="url(#arr)"/>

<rect class="teal-fill" x="584" y="178" width="92" height="58" rx="8" stroke-width="0.8"/>
<text class="th teal-tx" x="630" y="200" text-anchor="middle">Modèle</text>
<text class="tss teal-tx" x="630" y="218" text-anchor="middle">applique</text>

<text class="tss muted" x="350" y="288" text-anchor="middle">Aucune primitive spéciale : charger un skill = lire un fichier via le canal d'outil standard.</text>
</svg>
